<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0d1117;--surface:#161b22;--card:#1c2128;
  --border:rgba(255,255,255,0.07);
  --orange:#f4845f;--orange-lt:#f7a88a;--orange-dim:rgba(244,132,95,0.13);
  --teal:#4ec9b0;
  --text:#f0ede8;--text2:#9a9080;--text3:#52504a;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans','Noto Sans KR',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px 20px;}
.wrap{max-width:520px;width:100%;text-align:center;}
.icon{font-size:3.5rem;margin-bottom:14px;}
.title{font-size:1.7rem;font-weight:500;letter-spacing:-0.02em;margin-bottom:8px;}
.sub{font-size:0.9rem;color:var(--text2);line-height:1.7;font-weight:300;margin-bottom:32px;}
.cards{display:flex;flex-direction:column;gap:12px;}
.card{display:block;padding:22px 22px;background:var(--card);border:1px solid var(--border);border-radius:14px;text-decoration:none;color:var(--text);text-align:left;transition:border-color 0.15s,transform 0.1s;}
.card:hover{border-color:rgba(244,132,95,0.35);}
.card:active{transform:scale(0.98);}
.card-row{display:flex;align-items:center;gap:14px;}
.card-icon{font-size:2rem;flex-shrink:0;}
.card-text{flex:1;}
.card-title{font-size:1.02rem;font-weight:500;margin-bottom:3px;}
.card-desc{font-size:0.78rem;color:var(--text2);line-height:1.5;font-weight:300;}
.card-arrow{font-size:1.1rem;color:var(--text3);}
.card.primary{border-color:rgba(244,132,95,0.3);background:rgba(244,132,95,0.05);}
.card.primary .card-title{color:var(--orange-lt);}
.foot{margin-top:28px;font-size:0.7rem;color:var(--text3);line-height:1.6;}
</style>

<!-- 카카오톡 인앱브라우저 안내 배너 -->
<script>
(function(){
  var ua = navigator.userAgent || '';
  if(!/KAKAOTALK/i.test(ua)) return;
  document.addEventListener('DOMContentLoaded', function(){
    if(document.getElementById('kakaoInappBanner')) return;
    var url = location.href;
    var banner = document.createElement('div');
    banner.id = 'kakaoInappBanner';
    banner.setAttribute('role','status');
    banner.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#fee500;color:#3c1e1e;padding:11px 14px;font-size:13px;line-height:1.5;z-index:9999;display:flex;align-items:center;gap:10px;box-shadow:0 2px 12px rgba(0,0,0,0.25);font-family:"Noto Sans KR",-apple-system,BlinkMacSystemFont,sans-serif;';
    banner.innerHTML = '<span style="flex:1;font-weight:500;">💡 외부 브라우저로 열면 공유·이미지 저장이 더 잘 돼요</span>'+
      '<button id="kakaoOpenExternal" style="padding:7px 12px;background:#3c1e1e;color:#fee500;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-size:12px;flex-shrink:0;font-family:inherit;">열기</button>'+
      '<button id="kakaoBannerClose" aria-label="닫기" style="padding:6px 8px;background:transparent;color:#3c1e1e;border:none;cursor:pointer;font-size:18px;line-height:1;flex-shrink:0;">×</button>';
    document.body.prepend(banner);
    document.getElementById('kakaoOpenExternal').onclick = function(){
      location.href = 'kakaotalk://web/openExternal?url=' + encodeURIComponent(url);
    };
    document.getElementById('kakaoBannerClose').onclick = function(){
      banner.remove();
    };
  });
})();
</script>
